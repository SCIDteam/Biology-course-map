<!DOCTYPE html>
<html lang="en">
<head>
    <!-- d3.js library -->
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <!-- dagreD3.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre-d3/0.6.4/dagre-d3.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology Course Map</title>
    <link rel="stylesheet" href="frontend/css/style.css">
</head>
<body>
    <!-- ── Left panel: filters + legend ─────────────────────────────────── -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>Biology Course Map</h2>
            <button id="sidebar-toggle" title="Toggle sidebar" aria-label="Toggle sidebar">&#9776;</button>
        </div>

        <div id="sidebar-filters">
            <section class="sidebar-section">
                <h3 class="section-label">Filters</h3>
                <label for="course-level">Filter for a course level:</label>
                <div class="dropdown-wrapper">
                    <button id="dropdownButton-3" class="dropdown-toggle">Select Course Level</button>
                    <div id="dropdownContent-3" class="dropdown-panel">
                        <!-- Options will be generated dynamically here -->
                    </div>
                </div>
                <label for="course-subject">Filter by category:</label>
                <div class="dropdown-wrapper">
                    <button id="dropdownButton" class="dropdown-toggle">Select Category</button>
                    <div id="dropdownContent" class="dropdown-panel">
                        <!-- Options will be generated dynamically here -->
                    </div>
                </div>
                <label for="course-theme">Filter for a theme:</label>
                <div class="dropdown-wrapper">
                    <button id="dropdownButton-2" class="dropdown-toggle">Select Theme</button>
                    <div id="dropdownContent-2" class="dropdown-panel">
                        <!-- Options will be generated dynamically here -->
                    </div>
                </div>
                <label for="course-component">Filter by course component:</label>
                <div class="dropdown-wrapper">
                    <button id="dropdownButton-4" class="dropdown-toggle">Select Component</button>
                    <div id="dropdownContent-4" class="dropdown-panel">
                        <!-- Options will be generated dynamically here -->
                    </div>
                </div>
                <div class="input-container">
                    <label for="keywordInput">Filter by Search Term:</label>
                    <input type="text" id="keywordInput" placeholder="Enter keywords separated by commas" />
                    <button id="searchButton">Search</button>
                </div>
                <div class="zoom-control">
                    <label for="zoomSlider">Zoom: <span id="zoomValue">65%</span></label>
                    <input type="range" id="zoomSlider" min="0.1" max="3" step="0.01" value="0.65">
                </div>
            </section>

            <section class="sidebar-section">
                <button id="resetButton">Reset Graph</button>
            </section>

            <!-- Legend embedded at bottom of filter panel, vertical -->
            <div id="legend">
                <h3>Legend</h3>
                <div class="legend-item">
                    <svg width="50" height="20"><rect x="0" y="4" width="30" height="10" fill="#EEDFCC" /></svg>
                    <span>Filtered courses</span>
                </div>
                <div class="legend-item">
                    <svg width="50" height="20"><rect x="0" y="4" width="30" height="10" fill="cyan" /></svg>
                    <span>Prerequisites</span>
                </div>
                <div class="legend-item">
                    <svg width="50" height="20"><rect x="0" y="4" width="30" height="10" fill="coral" /></svg>
                    <span>Corequisites</span>
                </div>
                <div class="legend-item">
                    <svg width="50" height="20"><rect x="0" y="4" width="30" height="10" fill="#90EE90" /></svg>
                    <span>Dependent courses</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Center panel: D3 SVG map ──────────────────────────────────────── -->
    <div id="main">
        <div id="dialog" style="display:none; position:fixed; background:white; border:1px solid black; padding:10px; z-index:1000;">
            <h2 id="course-title"></h2>
            <p id="course-description"></p>
            <button id="close-dialog">Close</button>
        </div>
        <svg id="mySVG">
            <defs>
                <filter id="text-shadow">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
                    <feOffset dx="2" dy="2" result="offsetblur" />
                    <feFlood flood-color="rgba(0, 0, 0, 0.3)" />
                    <feComposite in2="offsetblur" operator="in" />
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
        </svg>
    </div>

    <!-- ── Right panel: course information ──────────────────────────────── -->
    <div id="right-panel">
        <div id="right-panel-header">
            <h3 class="section-label">Course Information</h3>
        </div>
        <div id="right-panel-content">
            <p id="course-info-placeholder">Click a course to view details.</p>
        </div>
    </div>

    <script src="frontend/js/bullsEyeLayout.js"></script>
    <script src="frontend/js/bio_script.js"></script>
</body>
</html>
